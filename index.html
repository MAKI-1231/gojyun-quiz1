    :root {
      --green: #7fc9a4;
      --green-dark: #2f7a55;
      --pink: #ffd9e4;
      --yellow: #fff3b0;
      --cream: #fffdf6;
      --ink: #263238;
      --muted: #5f6b66;
      --line: #d7eadf;
      --danger: #b84949;
      --ok: #237a4c;
      --shadow: 0 10px 30px rgba(45, 91, 69, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #fff5c7 0, transparent 28%),
                  radial-gradient(circle at top right, #ffe6ee 0, transparent 30%),
                  linear-gradient(180deg, #f4fff8 0%, #fffdf6 62%, #fff8f1 100%);
      line-height: 1.65;
    }
    .wrap {
      width: min(1060px, 94vw);
      margin: 0 auto;
      padding: 22px 0 88px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--green), var(--pink));
      box-shadow: var(--shadow);
    }
    h1 {
      font-size: clamp(2.1rem, 6vw, 4rem);
      margin: 0;
      letter-spacing: .03em;
      color: var(--green-dark);
      line-height: 1.05;
      font-weight: 900;
    }
    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.6vw, 1.25rem);
      font-weight: 700;
    }
    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 3px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 4vw, 34px);
      margin: 18px 0;
    }
    .top-info {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 10px;
    }
    .info-box {
      background: #f7fff9;
      border: 2px solid var(--line);
      border-radius: 22px;
      padding: 14px;
      text-align: center;
      font-size: clamp(1rem, 2.8vw, 1.18rem);
      font-weight: 800;
    }
    .info-box strong { font-size: 1.25em; color: var(--green-dark); }
    .section-title {
      font-size: clamp(1.25rem, 3.2vw, 1.7rem);
      margin: 0 0 12px;
      color: var(--green-dark);
      font-weight: 900;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
    }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
    }
    .select-btn {
      min-height: 78px;
      padding: 14px 16px;
      border-radius: 22px;
      background: #ffffff;
      border: 3px solid var(--line);
      color: var(--ink);
      font-size: clamp(1.05rem, 3.2vw, 1.35rem);
      font-weight: 900;
      transition: transform .08s ease, border-color .12s ease, background .12s ease;
    }
    .select-btn:hover { transform: translateY(-1px); }
    .select-btn.active {
      background: linear-gradient(135deg, #e7fff1, #fff7c9);
      border-color: var(--green);
      color: var(--green-dark);
    }
    .start-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
    }
    .main-btn {
      min-height: 70px;
      padding: 14px 28px;
      border-radius: 999px;
      background: var(--green-dark);
      color: #fff;
      font-size: clamp(1.18rem, 3.4vw, 1.55rem);
      font-weight: 900;
      box-shadow: var(--shadow);
    }
    .main-btn.secondary {
      background: #fff;
      color: var(--green-dark);
      border: 3px solid var(--green);
      box-shadow: none;
    }
    .main-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.6vw, 1.15rem);
      font-weight: 700;
    }
    .hidden { display: none !important; }
    .progress-area {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-weight: 900;
      color: var(--green-dark);
      font-size: clamp(1.05rem, 3vw, 1.35rem);
    }
    .bar {
      height: 18px;
      background: #e7f5ed;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid var(--line);
      flex: 1 1 260px;
    }
    .bar > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--yellow));
      transition: width .25s ease;
    }
    .question-card {
      background: #fffef9;
      border: 3px solid #f0e8c9;
      border-radius: 26px;
      padding: clamp(18px, 4vw, 34px);
      margin-top: 14px;
    }
    .level-pill {
      display: inline-block;
      border-radius: 999px;
      background: var(--yellow);
      color: #6b5a00;
      padding: 6px 16px;
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      font-weight: 900;
      margin-bottom: 12px;
    }
    .jp {
      font-size: clamp(1.25rem, 3.8vw, 1.7rem);
      font-weight: 900;
      margin: 6px 0 12px;
    }
    .frame {
      background: #f8fff9;
      border: 3px dashed var(--green);
      border-radius: 22px;
      padding: 16px;
      margin: 12px 0 18px;
      font-size: clamp(1.35rem, 4.6vw, 2.1rem);
      font-weight: 900;
      letter-spacing: .01em;
      line-height: 1.55;
    }
    .blank {
      display: inline-block;
      min-width: 160px;
      padding: 0 10px;
      color: var(--green-dark);
      border-bottom: 5px solid var(--green);
    }
    .answer-zone {
      min-height: 90px;
      background: #ffffff;
      border: 3px solid var(--line);
      border-radius: 22px;
      padding: 14px;
      margin: 12px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .answer-zone.empty::before {
      content: "ここに語句カードが入ります";
      color: #7b8781;
      font-size: clamp(1rem, 2.7vw, 1.2rem);
      font-weight: 800;
    }
    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 14px 0 18px;
    }
    .word {
      min-height: 72px;
      border-radius: 20px;
      padding: 12px 14px;
      background: #fff;
      border: 3px solid var(--green);
      color: var(--ink);
      font-size: clamp(1.35rem, 4.8vw, 2.05rem);
      font-weight: 900;
      line-height: 1.2;
      box-shadow: 0 6px 0 rgba(127, 201, 164, 0.25);
    }
    .word.used {
      opacity: .32;
      pointer-events: none;
      transform: translateY(4px);
      box-shadow: none;
    }
    .mini-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }
    .feedback {
      margin-top: 14px;
      padding: 16px;
      border-radius: 22px;
      font-size: clamp(1.1rem, 3.2vw, 1.45rem);
      font-weight: 900;
    }
    .feedback.ok { background: #e7fff1; color: var(--ok); border: 3px solid #b7e9ca; }
    .feedback.try { background: #fff7e6; color: #8a5c00; border: 3px solid #ffe0a3; }
    .correct-line {
      display: block;
      margin-top: 8px;
      font-size: clamp(1.2rem, 3.7vw, 1.75rem);
      color: var(--ink);
    }
    .result-big {
      text-align: center;
      font-size: clamp(2rem, 6vw, 4.3rem);
      color: var(--green-dark);
      font-weight: 900;
      line-height: 1.15;
      margin: 10px 0 18px;
    }
    .result-message {
      background: linear-gradient(135deg, #f0fff5, #fff7ca);
      border: 3px solid var(--green);
      border-radius: 28px;
      padding: 20px;
      font-size: clamp(1.3rem, 4vw, 1.9rem);
      font-weight: 900;
      text-align: center;
      margin: 16px 0;
    }
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(255, 255, 255, .92);
      border-top: 2px solid var(--line);
      backdrop-filter: blur(8px);
      text-align: center;
      padding: 10px 8px;
      color: var(--green-dark);
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: .03em;
    }
    @media (max-width: 640px) {
      header { align-items: flex-start; }
      .top-info { grid-template-columns: 1fr; }
      .word-grid { grid-template-columns: 1fr; }
      .word { min-height: 76px; }
      .main-btn { width: 100%; }
      .select-btn { min-height: 70px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">🌵</div>
        <div>
          <h1>語順クイズ</h1>
          <p class="subtitle">語句カードをタップして、自然な英語の順番にしよう</p>
        </div>
      </div>
    </header>

    <main>
      <section id="start" class="card">
        <h2 class="section-title">えらんでスタート</h2>
        <p class="note">1回10問。問題も語句カードも毎回ランダムに出ます。</p>

        <div class="top-info" aria-label="このクイズの内容">
          <div class="info-box"><strong>300問</strong><br>たっぷり練習</div>
          <div class="info-box"><strong>3段階</strong><br>★でやさしく表示</div>
          <div class="info-box"><strong>大きめ太字</strong><br>見やすさ重視</div>
        </div>

        <div class="card" style="box-shadow:none; margin-top:22px;">
          <h3 class="section-title">内容をえらぶ</h3>
          <div id="categoryButtons" class="btn-grid"></div>
        </div>

        <div class="card" style="box-shadow:none; margin-top:18px;">
          <h3 class="section-title">レベルをえらぶ</h3>
          <div id="levelButtons" class="btn-grid"></div>
        </div>

        <div class="start-row">
          <button id="startBtn" class="main-btn">10問スタート</button>
          <button id="shuffleBtn" class="main-btn secondary">おまかせ10問</button>
        </div>
      </section>

      <section id="quiz" class="card hidden" aria-live="polite">
        <div class="progress-area">
          <span id="qCount">1 / 10</span>
          <div class="bar"><div id="barFill"></div></div>
          <span id="scoreNow">正解 0</span>
        </div>

        <div class="question-card">
          <div id="levelPill" class="level-pill">★</div>
          <div id="jp" class="jp"></div>
          <div id="frame" class="frame"></div>

          <div id="answerZone" class="answer-zone empty"></div>
          <div id="wordGrid" class="word-grid"></div>

          <div class="mini-controls">
            <button id="undoBtn" class="main-btn secondary">1つ戻す</button>
            <button id="clearBtn" class="main-btn secondary">やり直す</button>
            <button id="checkBtn" class="main-btn">答え合わせ</button>
          </div>
          <div id="feedback" class="feedback hidden"></div>
          <div class="mini-controls" style="margin-top:14px;">
            <button id="nextBtn" class="main-btn hidden">次へ</button>
            <button id="quitBtn" class="main-btn secondary">最初に戻る</button>
          </div>
        </div>
      </section>

      <section id="result" class="card hidden">
        <div class="result-big" id="resultScore"></div>
        <div class="result-message" id="resultMessage"></div>
        <div class="start-row" style="justify-content:center;">
          <button id="againBtn" class="main-btn">もう一度10問</button>
          <button id="homeBtn" class="main-btn secondary">内容を選び直す</button>
        </div>
      </section>
    </main>
  </div>

  <footer>© 2026 さぼてん英会話</footer>

    const CATEGORY_LABELS = {
      all: "ぜんぶミックス",
      basic: "すぐ使える短い文",
      ask: "質問してみよう",
      connect: "つなげて話そう",
      daily: "日常会話",
      cafe: "カフェ英語"
    };

    const LEVEL_LABELS = {
      all: "★〜★★★ ミックス",
      1: "★ やさしめ",
      2: "★★ しっかり",
      3: "★★★ チャレンジ"
    };

    const messages = {
      low: [
        "ここからで大丈夫。英語の順番に目が慣れていく第一歩です🌱",
        "今日の10問に向き合えたことがすでに前進です。次は1問ずつ一緒に伸ばしましょう。",
        "あせらなくて大丈夫。カードを声に出すと、少しずつ順番が入りやすくなります。"
      ],
      mid: [
        "いい感じです。英語のかたまりをつかむ力が育っています🌵",
        "半分以上できています。声に出して読むと、もっと自然に身につきます。",
        "しっかり進んでいます。あと少しで英語の順番がもっと見えてきます。"
      ],
      high: [
        "すばらしいです。自然な英語の流れをかなりつかめています✨",
        "とてもいい調子です。会話で使える表現が増えてきています。",
        "かなり安定しています。次はスピードより、声に出す練習を大切にしましょう。"
      ],
      perfect: [
        "満点です。すごい集中力です！このまま会話でも使っていきましょう✨",
        "10問すべて正解。英語の順番がきれいに入っています。すばらしいです🌵",
        "パーフェクト！今日の自分に大きな拍手を送ってください。"
      ]
    };

    let selectedCategory = "all";
    let selectedLevel = "all";
    let session = [];
    let currentIndex = 0;
    let score = 0;
    let selected = [];
    let checked = false;
    let lastMode = { category: "all", level: "all" };

    const $ = (id) => document.getElementById(id);

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function choice(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function buildButtons() {
      const cats = Object.keys(CATEGORY_LABELS);
      $("categoryButtons").innerHTML = cats.map(cat => `
        <button class="select-btn ${cat === selectedCategory ? 'active' : ''}" data-cat="${cat}">${CATEGORY_LABELS[cat]}</button>
      `).join("");

      const levels = Object.keys(LEVEL_LABELS);
      $("levelButtons").innerHTML = levels.map(lv => `
        <button class="select-btn ${String(lv) === String(selectedLevel) ? 'active' : ''}" data-level="${lv}">${LEVEL_LABELS[lv]}</button>
      `).join("");

      document.querySelectorAll("[data-cat]").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedCategory = btn.dataset.cat;
          buildButtons();
        });
      });
      document.querySelectorAll("[data-level]").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedLevel = btn.dataset.level;
          buildButtons();
        });
      });
    }

    function makeSentence(q, chunks = q.chunks) {
      const middle = chunks.join(" ");
      const parts = [];
      if (q.before) parts.push(q.before);
      if (middle) parts.push(middle);
      if (q.after) parts.push(q.after);
      let s = parts.join(" ").replace(/\s+/g, " ").trim();
      s = s.replace(/\s+([,.?!])/g, "$1");
      if (q.ending && !/[.?!]$/.test(s)) s += q.ending;
      return s;
    }

    function frameText(q) {
      if (q.before || q.after) {
        const before = q.before ? `<span>${q.before}</span>` : "";
        const after = q.after ? `<span>${q.after}</span>` : "";
        const end = q.ending || "";
        return `${before} <span class="blank">　　　</span> ${after}${end}`;
      }
      return "語句カードを自然な順番にタップしてください。";
    }

    function getPool(category, level) {
      return QUESTIONS.filter(q =>
        (category === "all" || q.category === category) &&
        (level === "all" || String(q.level) === String(level))
      );
    }

    function startQuiz(category = selectedCategory, level = selectedLevel) {
      const pool = getPool(category, level);
      if (pool.length < 10) {
        alert("問題数が足りません。別の内容を選んでください。");
        return;
      }
      lastMode = { category, level };
      session = shuffle(pool).slice(0, 10).map(q => ({ ...q, displayChunks: shuffle(q.chunks) }));
      currentIndex = 0;
      score = 0;
      selected = [];
      checked = false;
      $("start").classList.add("hidden");
      $("result").classList.add("hidden");
      $("quiz").classList.remove("hidden");
      renderQuestion();
    }

    function renderQuestion() {
      const q = session[currentIndex];
      selected = [];
      checked = false;
      $("feedback").classList.add("hidden");
      $("nextBtn").classList.add("hidden");
      $("checkBtn").disabled = false;
      $("qCount").textContent = `${currentIndex + 1} / 10`;
      $("scoreNow").textContent = `正解 ${score}`;
      $("barFill").style.width = `${(currentIndex / 10) * 100}%`;
      $("levelPill").textContent = "★".repeat(Number(q.level));
      $("jp").textContent = q.jp;
      $("frame").innerHTML = frameText(q);
      renderAnswerZone();
      renderWordGrid();
    }

    function renderAnswerZone() {
      const zone = $("answerZone");
      zone.innerHTML = selected.map(item => `<button class="word" data-selected="${item.idx}">${item.text}</button>`).join("");
      zone.classList.toggle("empty", selected.length === 0);
      zone.querySelectorAll("[data-selected]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (checked) return;
          const idx = Number(btn.dataset.selected);
          const pos = selected.findIndex(s => s.idx === idx);
          if (pos >= 0) selected.splice(pos, 1);
          renderAnswerZone();
          renderWordGrid();
        });
      });
    }

    function renderWordGrid() {
      const q = session[currentIndex];
      $("wordGrid").innerHTML = q.displayChunks.map((text, idx) => {
        const used = selected.some(s => s.idx === idx);
        return `<button class="word ${used ? 'used' : ''}" data-idx="${idx}">${text}</button>`;
      }).join("");
      document.querySelectorAll("#wordGrid .word").forEach(btn => {
        btn.addEventListener("click", () => {
          if (checked || btn.classList.contains("used")) return;
          selected.push({ idx: Number(btn.dataset.idx), text: btn.textContent });
          renderAnswerZone();
          renderWordGrid();
        });
      });
    }

    function checkAnswer() {
      const q = session[currentIndex];
      if (selected.length !== q.chunks.length) {
        const f = $("feedback");
        f.className = "feedback try";
        f.innerHTML = "語句カードを全部入れてから答え合わせしましょう。";
        f.classList.remove("hidden");
        return;
      }
      checked = true;
      const answer = selected.map(s => s.text);
      const ok = answer.every((text, i) => text === q.chunks[i]);
      if (ok) score++;
      $("scoreNow").textContent = `正解 ${score}`;
      $("checkBtn").disabled = true;
      const f = $("feedback");
      f.className = `feedback ${ok ? 'ok' : 'try'}`;
      f.innerHTML = ok
        ? `いいですね！<span class="correct-line">${makeSentence(q)}</span>`
        : `もう少し！正しい順番はこちらです。<span class="correct-line">${makeSentence(q)}</span>`;
      f.classList.remove("hidden");
      $("nextBtn").textContent = currentIndex === 9 ? "結果を見る" : "次へ";
      $("nextBtn").classList.remove("hidden");
      $("barFill").style.width = `${((currentIndex + 1) / 10) * 100}%`;
    }

    function nextQuestion() {
      if (currentIndex < 9) {
        currentIndex++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      $("quiz").classList.add("hidden");
      $("result").classList.remove("hidden");
      $("barFill").style.width = "100%";
      $("resultScore").textContent = `${score} / 10 問 正解`;
      let key = "low";
      if (score === 10) key = "perfect";
      else if (score >= 7) key = "high";
      else if (score >= 4) key = "mid";
      $("resultMessage").textContent = choice(messages[key]);
    }

    function goHome() {
      $("quiz").classList.add("hidden");
      $("result").classList.add("hidden");
      $("start").classList.remove("hidden");
      buildButtons();
    }

    $("startBtn").addEventListener("click", () => startQuiz(selectedCategory, selectedLevel));
    $("shuffleBtn").addEventListener("click", () => startQuiz("all", "all"));
    $("checkBtn").addEventListener("click", checkAnswer);
    $("nextBtn").addEventListener("click", nextQuestion);
    $("quitBtn").addEventListener("click", goHome);
    $("homeBtn").addEventListener("click", goHome);
    $("againBtn").addEventListener("click", () => startQuiz(lastMode.category, lastMode.level));
    $("undoBtn").addEventListener("click", () => {
      if (checked) return;
      selected.pop();
      renderAnswerZone();
      renderWordGrid();
    });
    $("clearBtn").addEventListener("click", () => {
      if (checked) return;
      selected = [];
      renderAnswerZone();
      renderWordGrid();
    });

    buildButtons();
  </script>
